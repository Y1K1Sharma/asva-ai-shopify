# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "1487ab4d9256aa4f5399f984f24cecc6"
name = "Asva AI"
application_url = "https://asva-ai-shopify-production.up.railway.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
# Minimum-scopes per Shopify App Store §16. Only request scopes the
# app actually uses today. New scopes can be added in a future version
# with a re-consent prompt when we ship features that need them
# (e.g. write_themes once Protected Scope Exemption lands).
#
# Currently used:
#   read_products — Admin GraphQL query in /app/catalog page
#
# Webhook subscriptions (customers/data_request, customers/redact,
# shop/redact, app/scopes_update, app/uninstalled) don't require any
# additional scopes — they're either mandatory compliance topics or
# app-lifecycle events.
scopes = "read_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://asva-ai-shopify-production.up.railway.app/auth/callback"
]
